# Career-Ops - Canonical States
# English-only source of truth for tracker status values.
# applications.md should store exactly one of these labels.

states:
  - id: evaluated
    label: Evaluated
    description: Role reviewed and kept in the pipeline
    dashboard_group: evaluated

  - id: applied
    label: Applied
    description: Application submitted
    dashboard_group: applied

  - id: responded
    label: Responded
    description: Company has responded but interview has not started
    dashboard_group: responded

  - id: interview
    label: Interview
    description: Active interview process
    dashboard_group: interview

  - id: offer
    label: Offer
    description: Offer received
    dashboard_group: offer

  - id: rejected
    label: Rejected
    description: Rejected by company
    dashboard_group: rejected

  - id: discarded
    label: Discarded
    description: Discarded by user or role closed
    dashboard_group: discarded

  - id: skip
    label: SKIP
    description: Not worth pursuing
    dashboard_group: skip
